name: Archivo IA - Pack Offline
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest  # Usamos Linux porque es más eficiente para descargar
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Descargar Binarios para Windows
        run: |
          python -m pip install --upgrade pip setuptools wheel
          mkdir offline_packages
          # La magia está aquí: --only-binary=:all: prohíbe compilar código fuente
          # --platform win_amd64 asegura que bajamos los archivos para tu PC Windows
          pip download -r requirements.txt \
            -d offline_packages \
            --platform win_amd64 \
            --python-version 310 \
            --only-binary=:all: \
            --implementation cp \
            --abi cp310

      - name: Subir el botín (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: librerias-ia-offline
          path: offline_packages/
          retention-days: 1
          
