name: Archivo IA - Pack Offline
on: [push, workflow_dispatch] # workflow_dispatch permite ejecutarlo manualmente

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Preparar paquetes
        run: |
          python -m pip install --upgrade pip
          mkdir offline_packages
          pip download -r requirements.txt -d offline_packages
        # Si el archivo está en una subcarpeta, cambia 'requirements.txt' por 'carpeta/requirements.txt'

      - name: Subir el botín (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: librerias-ia-windows
          path: offline_packages/
          retention-days: 1
