name: Archivo IA - Pack Offline
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest  # Volvemos a Windows para asegurar compatibilidad total
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Preparar Herramientas y Descargar
        run: |
          python -m pip install --upgrade pip setuptools wheel
          mkdir offline_packages
          # Quitamos --only-binary para permitir que hnswlib se gestione
          pip download -r requirements.txt -d offline_packages
        
      - name: Subir el botín (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: librerias-ia-offline
          path: offline_packages/
          retention-days: 1
